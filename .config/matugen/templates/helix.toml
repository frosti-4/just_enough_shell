t5 = "#c3d0d1"
t6 = "#bde1e4"
t7 = "#ffa3a9"
t8 = "#feffff"
t9 = "#ffffff"
t10 = "#ffffff"
t11 = "#ffe8a6"

highlight = "#ff6cc3"
highlight_two = "#ffff74"
highlight_three = "#ffffe1"

selection = "#89fdff"
selection_fg = "#292c2d"

black = "#000000"
comment = "#b0837d"
comment_doc = "#507a86"
hints = "#646a74"
ruler = "#4f504c"

error = "#ff7a1d"
warning = "#ffff1d"
display = "#7dffff"
