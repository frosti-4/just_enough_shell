#--- ПЕРЕМЕННЫЕ -----------------------------------------------------------------------
$terminal = foot
$fileManager = dolphin
$menu = qs ipc call root toggleLaunch

#--- АВТОСТАРТ ------------------------------------------------------------------------
exec-once = /run/wrappers/bin/gnome-keyring-daemon --start --components=secrets,ssh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = openrgb --profile orflem
exec-once = fcitx5 -d --replace

exec-once = mpd-mpris
exec-once = zen-beta
exec-once = Telegram
# exec-once = boxflat
# exec-once = steam
exec-once = qbittorrent-nox
exec-once = foot rmpc

exec-once = qs -d
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = mkdir -p ~/Screenshots

#--- ОКРУЖЕНИЕ ------------------------------------------------------------------------
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = HYPRCURSOR_THEME, rose-pine-hyprcursors

source = ./color.conf
source = /etc/hypr/plugins.conf
plugin {
    hy3 {
        tabs {
            height = 21
            radius = 10
            text_height = 10
            padding = 3
            opacity = 0.85
            render_text = true
            col.active = rgb($colF)
            col.active.border = rgb($colF)
            col.active.text = rgb(2b2b2b)
            col.inactive = rgb(8c8c94)
            col.inactive.border = rgb(8c8c94)
            col.inactive.text = rgb(2b2b2b)
            col.urgent = rgb(8c8c94)
            col.urgent.text = rgb(2b2b2b)
        }
        
        autotile {
            enable = true
            ephemeral_groups = true
            trigger_width = 1000
            trigger_height = 400
        }
    }
    
    dynamic-cursors {
        enabled = true
        mode = none
        threshold = 1
    }
}

#--- ВНЕШНИЙ ВИД ----------------------------------------------------------------------
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = rgb($colF)   # оставил как было, в swayfx цвета не заданы явно
    col.inactive_border = rgb($colU)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 0.85
    inactive_opacity = 0.45

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 2
        passes = 3
        vibrancy = 0.1696
    }

    dim_inactive = true          # аналог default_dim_inactive
    dim_strength = 0.35          # 1 - 0.45 = 0.55
    dim_special = 0.35
}

animations {
    enabled = true
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.01
    
    animation = windows, 0, 1, myBezier
    animation = windowsOut, 0, 5, default, popin 80%
    animation = border, 0, 10, default
    animation = fade, 0, 3, default
    animation = workspaces, 1, 2.3, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#--- МОНИТОРЫ -------------------------------------------------------------------------
monitor = , highrr, auto, 1

#--- ВВОД -----------------------------------------------------------------------------
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle,grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }

    accel_profile = flat        # как в swayfx pointer accel flat
    force_no_accel = true
}

gesture = 3, horizontal, workspace   # как было, в swayfx нет явных жестов

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

#--- ХОТКЕИ (ПЕРЕНЕСЕНО ИЗ SWAYFX) ----------------------------------------------------
$mainMod = SUPER

# Приложения
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager

# Закрыть окно
bind = $mainMod, C, killactive,

# Лейауты
bind = $mainMod, G, layoutmsg, layouttabbed                     # аналог layout tabbed
bind = $mainMod CTRL, G, layoutmsg, togglelayout                 # аналог layout toggle split
# bind = $mainMod, g, hy3:makegroup, tab
# bind = $mainMod CTRL, g, hy3:changegroup, toggletab
# bind = $mainMod, h, hy3:makegroup, h
# bind = $mainMod, v, hy3:makegroup, v
# bind = $mainMod, j, hy3:changegroup, togglesplit

# Сплит
bind = $mainMod, H, movefocus, l                                 # в swayfx $mod+h splith, но я переназначил, т.к. h уже занят фокусом
bind = $mainMod, V, movefocus, d                                 # аналогично
bind = $mainMod, J, layoutmsg, togglesplit

# Фуллскрин
bind = $mainMod, Space, fullscreen, 1

# Плавающее / sticky
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, F, pin     # sticky в hyprland — pin

# Плавающий модификатор
bindm = $mainMod ALT, mouse:272, movewindow
bindm = $mainMod ALT, mouse:273, resizewindow

# Навигация между воркспейсами (back_and_forth)
bind = $mainMod, Tab, workspace, previous
bind = $mainMod SHIFT, Tab, movetoworkspace, previous

# Скретчпад (по подобию swayfx scratchpad)
bind = $mainMod SHIFT, minus, movetoworkspace, special:scratch
bind = $mainMod, minus, togglespecialworkspace, scratch

# Перезагрузить Hyprland
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Выход
bind = $mainMod, M, exec, swaynag -t warning -m 'Exit Hyprland?' -B 'Yes' 'hyprctl dispatch exit'

# Power menu / дашборд
bind = $mainMod, P, exec, qs ipc call root togglePower
bind = $mainMod, W, exec, qs kill && qs -d

# Медиа клавиши
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Дополнительные медиа бинды из swayfx
bind = ALT, F9, exec, pamixer -t
bind = ALT, F10, exec, pamixer -d 5
bind = ALT, F11, exec, pamixer -i 5
bind = ALT, F12, exec, qs ipc call root togglePlayer
bindl = CTRL, slash, exec, playerctl play-pause
bindl = CTRL, period, exec, playerctl next
bindl = CTRL, comma, exec, playerctl previous

# Яркость (для внешнего монитора через ddcutil)
bind = ALT, Prior, exec, ddcutil --bus 11 setvcp 10 + 5
bind = ALT, Next, exec, ddcutil --bus 11 setvcp 10 - 5

# Скриншоты
bind = , home, exec, sh -c 'FILE=~/Screenshots/$(date +%Y-%m-%d_%H-%M-%S)_screenshot.png; grim -g "$(slurp -b 3d3d3dCC -c CCCCCCCC)" - | tee "$FILE" | wl-copy && [ -s "$FILE" ] || rm -f "$FILE"'
bindl = SHIFT, home, exec, grim - | tee ~/Screenshots/$(date +%Y-%m-%d_%H-%M-%S)_fullscreen.png | wl-copy

# Colorpicker
bind = $mainMod, N, exec, hyprpicker -a

# Фокус
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# # Перемещение окна
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Переключение фокуса
# bind = $mainMod, left, hy3:movefocus, l
# bind = $mainMod, down, hy3:movefocus, d
# bind = $mainMod, up, hy3:movefocus, u
# bind = $mainMod, right, hy3:movefocus, r

# Перемещение окна
# bind = $mainMod SHIFT, left, hy3:movewindow, l
# bind = $mainMod SHIFT, down, hy3:movewindow, d
# bind = $mainMod SHIFT, up, hy3:movewindow, u
# bind = $mainMod SHIFT, right, hy3:movewindow, r

# Ресайз окон (без режима, через клавиши)
bind = $mainMod CTRL ALT, left, resizeactive, -20 0
bind = $mainMod CTRL ALT, right, resizeactive, 20 0
bind = $mainMod CTRL ALT, up, resizeactive, 0 -20
bind = $mainMod CTRL ALT, down, resizeactive, 0 20

# Воркспейсы
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Переключение воркспейсов колёсиком мыши
bind = $mainMod, mouse_down, workspace, +1
bind = $mainMod, mouse_up, workspace, -1

# Переместить окно на воркспейс
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod ALT, mouse:272, togglefloating

# Режим мыши (как в swayfx)
bind = $mainMod SHIFT, backslash, submap, mouse
submap = mouse
bind = , h, movecursor, -15 0
bind = , j, movecursor, 0 15
bind = , k, movecursor, 0 -15
bind = , l, movecursor, 15 0
bind = , Left, movecursor, -15 0
bind = , Down, movecursor, 0 15
bind = , Up, movecursor, 0 -15
bind = , Right, movecursor, 15 0
bind = SHIFT, h, movecursor, -50 0
bind = SHIFT, j, movecursor, 0 50
bind = SHIFT, k, movecursor, 0 -50
bind = SHIFT, l, movecursor, 50 0
bind = SHIFT, Left, movecursor, -50 0
bind = SHIFT, Down, movecursor, 0 50
bind = SHIFT, Up, movecursor, 0 -50
bind = SHIFT, Right, movecursor, 50 0
# bind = , space, mouseclick, left
# bind = , Return, mouseclick, right
bind = , Escape, submap, reset
bind = , q, submap, reset
submap = reset

#--- ПРАВИЛА ОКОН (ПЕРЕНЕСЕНО ИЗ SWAYFX) ---------------------------------------------
windowrule{
    name=pavucontrol
    float=1
    size=1000 500
    move=2428 0
    match:class=org.pulseaudio.pavucontrol
}

windowrule{
    name=pwvucontrol
    float=1
    size=1000 500
    move=2428 0
    match:class=pwvucontrol
}

windowrule{
    name=blueman
    float=1
    size=730 400
    move=2698 0
    match:class=blueman
}

windowrule{
    name=zoom
    opacity=1.0
    noblur=1
    match:class=zoom
}

windowrule{
    name=picture_in_picture
    opacity=1.0
    float=1
    size=900 400
    move=2528 0
    match:title=.*Картинка в картинке.*
}
