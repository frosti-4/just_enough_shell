# Конфиг для Hyprland
#--- КЛАВИША МОДИФИКАТОР --------------------------------------------------------------
$mod = SUPER

#--- ПЕРЕМЕННЫЕ -----------------------------------------------------------------------
$term = ghostty
$menu = pgrep rofi && pkill rofi || ~/.config/rofi/launcher.sh
$filemanager = pcmanfm

#--- АВТОСТАРТ ------------------------------------------------------------------------
# Системные утилиты
exec-once = /run/wrappers/bin/gnome-keyring-daemon --start --components=secrets,ssh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = openrgb --profile xmas

# Программы
exec-once = zen-browser
exec-once = Telegram
# exec-once = io.github.lawstorant.boxflat
# exec-once = steam
# exec-once = solaar

# Утилиты рабочего места
exec-once = eww daemon && eww open-many Btime corner-top-left corner-top-right corner-bottom-left corner-bottom-right notifications player mycal weather sysinf hbar
# exec-once = mpvpaper -o 'no-audio loop video-zoom=0' '*' ~/.cache/walls/live-bg.mp4
# exec-once = mpvpaper -o 'no-audio loop video-zoom=0.43' '*' ~/.cache/walls/live-bg.mp4

# Буфер обмена
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Скриншоты
exec-once = mkdir -p ~/Screenshots

#--- ДЕКОРАЦИИ ОКОН -------------------------------------------------------------------
# Скругления
decoration {
    rounding = 8
    
    # Прозрачность окон
    active_opacity = 0.85
    inactive_opacity = 0.85
    
    # Тени
    shadow {
        enabled = false
    }
    
    # Блюр
    blur {
        enabled = true
        xray = true
        passes = 3
        size = 2
        noise = 0.05
        new_optimizations = true
    }
    
    # Затемнение неактивных окон
    dim_inactive = true
    dim_strength = 0.35
}

# Гапсы
general {
    gaps_in = 6
    gaps_out = 0
    
    # Толщина рамок
    border_size = 2
    
    # Цвета рамок
    col.active_border = rgb(ffb2bd)
    col.inactive_border = rgb(8c8c94)
    
    layout = hy3
    
    resize_on_border = true
    extend_border_grab_area = 15
}

#--- УКРАШАТЕЛЬСТВА -------------------------------------------------------------------
# Обои
exec-once = swaybg -i ~/.cache/walls/no-live-bg.jpg -m fill

# Курсор
env = HYPRCURSOR_THEME, rose-pine-hyprcursor
env = HYPRCURSOR_SIZE, 32
env = XCURSOR_THEME, rose-pine
env = XCURSOR_SIZE, 32

exec-once = hyprctl setcursor rose-pine 32

# GTK темы
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Yaru'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'rose-pine'
exec-once = gsettings set org.gnome.desktop.interface font-name 'Mononoki Nerd Font Propo 10'
exec-once = gsettings set org.gnome.desktop.wm.preferences button-layout ''

#--- НАСТРОЙКИ МОНИТОРОВ --------------------------------------------------------------
monitor = ,highrr,auto,1

#--- РАСКЛАДКА КЛАВИАТУРЫ -------------------------------------------------------------
input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle,grp:alt_shift_toggle
    
    repeat_rate = 35
    repeat_delay = 250
    
    numlock_by_default = true
    
    follow_mouse = 1
    
    sensitivity = 0
    accel_profile = flat
}

#--- ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ -------------------------------------------------------------
env = WLR_RENDERER, vulkan
env = WLR_NO_HARDWARE_CURSORS, 0

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct

env = NIXPKGS_ALLOW_INSECURE, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto

env = WLR_DRM_DEVICES, /dev/dri/card1
env = LIBVA_DRIVER_NAME, radeonsi

env = MOZ_ENABLE_WAYLAND, 1

#--- ПЛАГИНЫ --------------------------------------------------------------------------
plugin {
    hy3 {
        tabs {
            height = 21
            radius = 8
            text_height = 10
            padding = 3
            render_text = true
            col.active = rgb(ffb2bd)
            col.active.text = rgb(2b2b2b)
            col.inactive = rgb(8c8c94)
            col.inactive.text = rgb(2b2b2b)
            col.urgent = rgb(8c8c94)
            col.urgent.text = rgb(2b2b2b)
        }
        
        autotile {
            enable = true
            ephemeral_groups = true
            trigger_width = 1000
            trigger_height = 400
        }
    }
    
    dynamic-cursors {
        enabled = true
        mode = none
        threshold = 1
    }
}

#--- АНИМАЦИИ -------------------------------------------------------------------------
animations {
    enabled = true
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

#--- РАЗНОЕ ---------------------------------------------------------------------------
misc {
    vfr = true
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

xwayland {
    force_zero_scaling = true
}

#--- ХОТКЕИ ---------------------------------------------------------------------------
# Приложения
bind = $mod, q, exec, $term
bind = $mod, d, exec, $menu
bind = $mod, e, exec, $filemanager

# Табы и сплиты
bind = $mod, g, hy3:makegroup, tab
bind = $mod CTRL, g, hy3:changegroup, toggletab
bind = $mod, h, hy3:makegroup, h
bind = $mod, v, hy3:makegroup, v
bind = $mod, j, hy3:changegroup, togglesplit

# Управление звуком и медиа
bind = Control, F9, exec, pamixer -t
bind = Control, F10, exec, pamixer -d 5
bind = Control, F11, exec, pamixer -i 5
bind = Control, F12, exec, ~/.config/eww/scripts/popup.sh plr
bindl = Control, slash, exec, playerctl play-pause
bindl = Control, period, exec, playerctl next
bindl = Control, comma, exec, playerctl previous

# Управление яркостью
bind = ALT, Prior, exec, ddcutil --bus 9 setvcp 10 + 5
bind = ALT, Next, exec, ddcutil --bus 9 setvcp 10 - 5

# Скриншоты
bind = , Print, exec, sh -c 'FILE=~/Screenshots/$(date +%Y-%m-%d_%H-%M-%S)_screenshot.png; grim -g "$(slurp -b 3d3d3dCC -c CCCCCCCC)" - | tee "$FILE" | wl-copy && [ -s "$FILE" ] || rm -f "$FILE"'
bindl = SHIFT, Print, exec, grim - | tee ~/Screenshots/$(date +%Y-%m-%d_%H-%M-%S)_fullscreen.png | wl-copy

# Colorpicker
bind = $mod, n, exec, hyprpicker -a

# Закрыть окно
bind = $mod, c, killactive

# Панель управления
bind = $mod, w, exec, pgrep eww && pkill eww || eww daemon && eww open-many Btime corner-top-left corner-top-right corner-bottom-left corner-bottom-right notifications mycal weather player sysinf hbar

bind = $mod, l, exec, eww open --toggle dashboard

# Power menu
bind = $mod, p, exec, eww open --toggle power_pc

# Перезагрузить конфиг
bind = $mod SHIFT, r, exec, hyprctl reload

# Выход из Hyprland
bind = $mod, m, exit

# Переключение фокуса
bind = $mod, left, hy3:movefocus, l
bind = $mod, down, hy3:movefocus, d
bind = $mod, up, hy3:movefocus, u
bind = $mod, right, hy3:movefocus, r

# Перемещение окна
bind = $mod SHIFT, left, hy3:movewindow, l
bind = $mod SHIFT, down, hy3:movewindow, d
bind = $mod SHIFT, up, hy3:movewindow, u
bind = $mod SHIFT, right, hy3:movewindow, r

# Переход по воркспейсам
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up, workspace, e+1
bind = $mod ALT, left, workspace, e-1
bind = $mod ALT, right, workspace, e+1

# Перемещение окон на другой воркспейс
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod CTRL SHIFT, left, movetoworkspace, e-1
bind = $mod CTRL SHIFT, right, movetoworkspace, e+1

# Фуллскрин
bind = $mod, space, fullscreen, 1

# Сделать окно плавающим
bind = $mod ALT, mouse:272, togglefloating

# Всунуть активное окно в скрачпад
bind = $mod SHIFT, minus, movetoworkspace, special

# Показать окна из скрачпада
bind = $mod, minus, togglespecialworkspace

# Перемещение и изменение размеров окон с помощью мышки
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Переход в режим ресайза
bind = $mod, r, submap, resize

submap = resize
bind = , left, resizeactive, -10 0
bind = , down, resizeactive, 0 10
bind = , up, resizeactive, 0 -10
bind = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

#--- ПРАВИЛА ОКОН ---------------------------------------------------------------------
windowrulev2 = float, class:(org.pulseaudio.pavucontrol)
windowrulev2 = size 1000 500, class:(org.pulseaudio.pavucontrol)
windowrulev2 = move 2428 0, class:(org.pulseaudio.pavucontrol)

windowrulev2 = float, class:(pwvucontrol)
windowrulev2 = size 1000 500, class:(pwvucontrol)
windowrulev2 = move 2428 0, class:(pwvucontrol)

windowrulev2 = float, class:(blueman)
windowrulev2 = size 730 400, class:(blueman)
windowrulev2 = move 2698 0, class:(blueman)

windowrulev2 = noblur, class:^(zoom)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(zoom)$

windowrulev2 = opacity 1.0 override 1.0 override, title:^(Картинка в картинке)$
windowrulev2 = float, title:^(Картинка в картинке)$
windowrulev2 = pin, title:^(Картинка в картинке)$
windowrulev2 = dimaround, title:^(Картинка в картинке)$
windowrulev2 = size 900 400, title:^(Картинка в картинке)$
windowrulev2 = move 2528 0, title:^(Картинка в картинке)$
