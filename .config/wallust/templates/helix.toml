# Helix Theme Template using wallust colors

# --- Syntax Elements ---

"attribute" = "{{color6}}"
"type" = "{{color14}}"
"type.enum.variant" = "{{color14}}"
"constructor" = "{{color7}}"

"constant" = "{{color6}}"
"constant.character" = "{{color6}}"
"constant.character.escape" = "{{color14}}"

"string" = "{{color7}}"
"string.regexp" = "{{color14}}"
"string.special" = "{{color15}}"
"string.special.symbol" = "{{color1}}"

"comment" = { fg = "{{color5}}", modifiers = ["italic"] }

"variable" = "{{foreground}}"
"variable.parameter" = { fg = "{{color8}}", modifiers = ["italic"] }
"variable.builtin" = "{{color1}}"
"variable.other.member" = "{{color6}}"

"label" = "{{color7}}"

"punctuation" = "{{color5}}"
"punctuation.special" = "{{color14}}"

"keyword" = "{{color6}}"
"keyword.control.conditional" = { fg = "{{color6}}", modifiers = ["italic"] }

"operator" = "{{color14}}"

"function" = "{{color6}}"
"function.macro" = "{{color14}}"

"tag" = "{{color6}}"
"namespace" = { fg = "{{color14}}", modifiers = ["italic"] }

"special" = "{{color6}}"

# --- Markup ---

"markup.heading.1" = "{{color1}}"
"markup.heading.2" = "{{color6}}"
"markup.heading.3" = "{{color14}}"
"markup.heading.4" = "{{color7}}"
"markup.heading.5" = "{{color15}}"
"markup.heading.6" = "{{color8}}"

"markup.list" = "{{color14}}"
"markup.list.unchecked" = "{{color5}}"
"markup.list.checked" = "{{color7}}"

"markup.bold" = { fg = "{{color6}}", modifiers = ["bold"] }
"markup.italic" = { fg = "{{color14}}", modifiers = ["italic"] }

"markup.link.url" = { fg = "{{color6}}", modifiers = ["italic", "underlined"] }
"markup.link.text" = "{{color7}}"
"markup.link.label" = "{{color14}}"
"markup.raw" = "{{color15}}"
"markup.quote" = "{{color8}}"

# --- Diff ---

"diff.plus" = "{{color6}}"
"diff.minus" = "{{color1}}"
"diff.delta" = "{{color14}}"

# --- UI Elements ---

"ui.background" = { fg = "{{foreground}}", bg = "none" }

"ui.linenr" = { fg = "{{color5}}" }
"ui.linenr.selected" = { fg = "{{color7}}" }

"ui.statusline" = { fg = "{{foreground}}", bg = "none" }
"ui.statusline.inactive" = { fg = "{{color5}}", bg = "none" }
"ui.statusline.normal" = { fg = "{{background}}", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "{{background}}", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "{{background}}", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "{{foreground}}", bg = "none" }
"ui.window" = { fg = "{{color5}}" }
"ui.help" = { fg = "{{color5}}", bg = "none" }

"ui.bufferline" = { fg = "{{color5}}", bg = "none" }
"ui.bufferline.active" = { fg = "{{background}}", bg = "{{color6}}", underline = { color = "{{color6}}", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "{{foreground}}"
"ui.text.focus" = { fg = "{{color6}}", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "{{color5}}" }
"ui.text.directory" = { fg = "{{color6}}" }

"ui.virtual" = "{{color5}}"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "{{color3}}"
"ui.virtual.inlay-hint" = { fg = "{{color5}}", bg = "none" }
"ui.virtual.jump-label" = { fg = "{{color14}}", modifiers = ["bold"] }

"ui.selection" = { bg = "{{color3}}" }

"ui.cursor" = { fg = "{{background}}", bg = "{{foreground}}" }
"ui.cursor.primary" = { fg = "{{background}}", bg = "{{color7}}" }
"ui.cursor.match" = { fg = "{{foreground}}", modifiers = ["bold"] }

"ui.highlight" = { bg = "{{color3}}", modifiers = ["bold"] }

"ui.menu" = { fg = "{{foreground}}", bg = "none" }
"ui.menu.selected" = { fg = "{{color6}}", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "{{color1}}", underline = { color = "{{color1}}", style = "curl" } }
"diagnostic.warning" = { fg = "{{color14}}", underline = { color = "{{color14}}", style = "curl" } }
"diagnostic.info" = { fg = "{{color6}}", underline = { color = "{{color6}}", style = "curl" } }
"diagnostic.hint" = { fg = "{{color8}}", underline = { color = "{{color8}}", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks ---

error = "{{color1}}"
warning = "{{color14}}"
info = "{{color6}}"
hint = "{{color5}}"
